name: Daily Play Store Agent Monitor

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      app_id:
        description: "App Package Name to monitor (e.g., com.example.app)"
        required: false
        default: "com.spotify.music"

permissions:
  contents: read

jobs:
  monitor:
    name: Run Play Store Agent Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Google Antigravity SDK
        run: |
          pip install google-antigravity

      - name: Run Antigravity Agent Workflow
        env:
          GOOGLE_PLAY_STORE_CREDENTIALS: ${{ secrets.GOOGLE_PLAY_STORE_CREDENTIALS }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          antigravity run playstore-monitoring --param app_id=${{ github.event.inputs.app_id || 'com.spotify.music' }}
